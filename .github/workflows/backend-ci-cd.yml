name: Backend CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: starttech-backend

jobs:
  test:
    name: Test and Code Quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        working-directory: ./backend
        run: go mod download

      - name: Run unit tests
        working-directory: ./backend
        run: go test ./... -v -short

      - name: Run code quality checks
        working-directory: ./backend
        run: |
          go fmt ./...
          go vet ./...

      - name: Run vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Get infrastructure info
        id: infra
        run: |
          # Get ALB DNS
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names starttech-alb-production \
            --query "LoadBalancers[0].DNSName" \
            --output text 2>/dev/null || echo "N/A")
          echo "ALB_DNS=$ALB_DNS" >> $GITHUB_OUTPUT
          
          # Get Redis endpoint
          REDIS_ENDPOINT=$(aws elasticache describe-cache-clusters \
            --cache-cluster-id starttech-redis-production \
            --show-cache-node-info \
            --query "CacheClusters[0].CacheNodes[0].Endpoint.Address" \
            --output text 2>/dev/null || echo "N/A")
          echo "REDIS_ENDPOINT=$REDIS_ENDPOINT" >> $GITHUB_OUTPUT
          
          # Get ECR registry
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          echo "ECR_REGISTRY=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          
          echo "ALB DNS: $ALB_DNS"
          echo "Redis: $REDIS_ENDPOINT"

      - name: Deploy to EC2 instances via SSM
        run: |
          # Get running instances
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names starttech-backend-asg-production \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)
          
          if [ -z "$INSTANCE_IDS" ]; then
            echo "ERROR: No running instances found"
            exit 1
          fi
          
          echo "Deploying to instances: $INSTANCE_IDS"
          
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Deploying to $INSTANCE_ID..."
            
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters "{
                \"commands\": [
                  \"aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.infra.outputs.ECR_REGISTRY }}\",
                  \"docker pull ${{ steps.infra.outputs.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest\",
                  \"docker stop starttech-backend 2>/dev/null || true\",
                  \"docker rm starttech-backend 2>/dev/null || true\",
                  \"docker run -d --name starttech-backend -p 8080:8080 --restart always \
                    -e MONGO_URI='${{ secrets.MONGO_URI }}' \
                    -e JWT_SECRET_KEY='${{ secrets.JWT_SECRET_KEY }}' \
                    -e REDIS_ADDR='${{ steps.infra.outputs.REDIS_ENDPOINT }}:6379' \
                    -e ENABLE_CACHE=true \
                    -e LOG_LEVEL=INFO \
                    -e LOG_FORMAT=json \
                    -e PORT=8080 \
                    -e DB_NAME=much_todo_db \
                    -e ALLOWED_ORIGINS='*' \
                    -e SECURE_COOKIE=false \
                    ${{ steps.infra.outputs.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest\",
                  \"sleep 5\",
                  \"docker ps --filter name=starttech-backend\",
                  \"docker logs --tail 10 starttech-backend\"
                ]
              }" \
              --query "Command.CommandId" \
              --output text)
            
            echo "SSM Command ID: $COMMAND_ID"
            
            # Wait for command to complete
            sleep 15
            
            # Check command status
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)
            
            echo "Command status: $STATUS"
            
            if [ "$STATUS" != "Success" ]; then
              echo "Command output:"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardOutputContent" \
                --output text
              echo "Command errors:"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
            fi
          done

      - name: Verify deployment
        run: |
          echo "Waiting 30 seconds for containers to stabilize..."
          sleep 30
          
          # Check target group health via AWS API (doesn't need network access to ALB)
          echo "Checking target group health..."
          TG_ARN=$(aws elbv2 describe-target-groups \
            --names starttech-tg-production \
            --query "TargetGroups[0].TargetGroupArn" \
            --output text)
          
          aws elbv2 describe-target-health \
            --target-group-arn "$TG_ARN" \
            --query "TargetHealthDescriptions[].{Instance:Target.Id,Health:TargetHealth.State}" \
            --output table
          
          echo ""
          echo "Deployment complete!"
          echo "ALB DNS: ${{ steps.infra.outputs.ALB_DNS }}"
          echo "CloudFront URL: https://$(aws cloudfront list-distributions --query "DistributionList.Items[0].DomainName" --output text)"
